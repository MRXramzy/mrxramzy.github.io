<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rēvra — Smart Asset Command Center</title>
    
    <meta name="description" content="Rēvra is a premium, glassmorphic asset deployment command center and intuitive digital wishlist framework.">
    <meta property="og:title" content="Rēvra — Luxury Asset Dashboard">
    <meta property="og:description" content="Futuristic Bento layout architecture optimized for luxury tracking.">
    <meta property="og:type" content="website">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M30,20 L50,55 L70,20 L85,20 L57,68 L57,80 L43,80 L43,68 L15,20 Z' fill='%237C5CFF'/%3E%3Ccircle cx='50' cy='43' r='6' fill='%2306B6D4'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230F1115'/%3E%3Cpath d='M32,25 L50,58 L68,25 L82,25 L56,70 L56,80 L44,80 L44,70 L18,25 Z' fill='%237C5CFF'/%3E%3Ccircle cx='50' cy='47' r='5' fill='%2306B6D4'/%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0F1115;
            --bg-secondary: #171A21;
            --card-bg: rgba(30, 35, 45, 0.4);
            --card-hover: rgba(35, 43, 56, 0.65);
            --border-color: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(124, 92, 255, 0.25);
            
            --text-primary: #F5F7FA;
            --text-secondary: #9CA3AF;
            
            --accent-purple: #7C5CFF;
            --accent-cyan: #06B6D4;
            --accent-green: #22C55E;
            --danger: #EF4444;
            
            --revra-gradient: linear-gradient(135deg, #7C5CFF 0%, #06B6D4 100%);
            --glow-purple: radial-gradient(circle at top left, rgba(124, 92, 255, 0.18), transparent 45%);
            --glow-cyan: radial-gradient(circle at bottom right, rgba(6, 182, 212, 0.12), transparent 45%);
        }

        /* Ambient Matrix Grid Systems & Text Overrides */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, h4, .font-heading, .btn-text { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }

        body {
            background: 
                var(--glow-purple),
                var(--glow-cyan),
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px),
                var(--bg-main);
            background-size: 100% 100%, 100% 100%, 45px 45px, 45px 45px;
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: 110px;
            padding-bottom: 60px;
            overflow-x: hidden;
        }

        /* Launcher Splash Infrastructure Layout */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .splash-glow {
            position: absolute; width: 200px; height: 200px;
            background: var(--accent-purple); filter: blur(120px); opacity: 0.4;
            animation: pulseGlow 3s infinite ease-in-out;
        }
        .splash-logo { width: 80px; height: 80px; transform: scale(0.9); animation: bootScale 1s forwards cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 2; }

        /* Premium Glassmorphic Navigation Head */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 2000;
            background: rgba(15, 17, 21, 0.7);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: center; padding: 20px 24px;
        }
        .nav-wrap { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        .brand-container { display: flex; align-items: center; gap: 12px; text-decoration: none; position: relative; }
        .logo-svg { width: 28px; height: 28px; filter: drop-shadow(0 0 8px rgba(124,92,255,0.4)); }
        .brand-name { font-size: 26px; font-weight: 700; color: var(--text-primary); text-transform: lowercase; letter-spacing: -1.5px; }
        .brand-name span { color: var(--accent-cyan); }

        /* High-Density Layout Matrix Grid */
        .app-layout {
            width: 100%; max-width: 1240px; margin: 0 auto;
            padding: 0 24px; display: grid;
            grid-template-columns: repeat(12, 1fr); gap: 24px;
        }

        /* Glassmorphic Bento Modular Boxes */
        .bento-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color); border-radius: 24px; padding: 26px;
            position: relative; overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s, box-shadow 0.4s;
        }
        .bento-panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(255,255,255,0.03) 0%, transparent 60%);
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .bento-panel:hover::before { opacity: 1; }
        .bento-panel:hover {
            transform: translateY(-2px);
            border-color: rgba(124, 92, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255,255,255,0.05);
        }

        /* Grid Allocation Architecture Weights */
        .col-4 { grid-column: span 4; }
        .col-5 { grid-column: span 5; }
        .col-7 { grid-column: span 7; }
        .col-12 { grid-column: span 12; }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
        .panel-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); }

        /* Dashboard Typography Displays */
        .metric-large { font-size: 46px; font-weight: 700; margin-top: 6px; letter-spacing: -1.5px; }
        .metric-large.cyan-glow { background: var(--revra-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 10px rgba(6,182,212,0.15)); }

        /* Input Controls Layout System */
        .form-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        .field-box { display: flex; flex-direction: column; gap: 8px; }
        .field-box.wide { grid-column: span 2; }
        .field-box label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.8px; }
        .field-box input, .field-box select {
            background: rgba(10, 12, 16, 0.45); border: 1px solid var(--border-color);
            padding: 13px 16px; border-radius: 14px; color: var(--text-primary); font-size: 14px;
            outline: none; transition: border-color 0.25s, background 0.25s;
        }
        .field-box input:focus, .field-box select:focus { border-color: var(--accent-purple); background: rgba(10, 12, 16, 0.75); box-shadow: 0 0 0 3px rgba(124,92,255,0.15); }
        
        .action-submit-btn {
            grid-column: span 2; margin-top: 10px;
            background: var(--revra-gradient); color: white;
            border: none; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 4px 20px rgba(124, 92, 255, 0.25);
        }
        .action-submit-btn:hover { filter: brightness(1.1); }
        .action-submit-btn:active { transform: scale(0.98); }

        /* Control Nodes System Parameters */
        .config-row { display: flex; flex-direction: column; gap: 14px; }
        .config-node { display: flex; align-items: center; gap: 14px; background: rgba(10,12,16,0.25); padding: 12px 16px; border-radius: 14px; border: 1px solid var(--border-color); }
        .config-node label { font-size: 11px; font-weight: 700; color: var(--accent-purple); min-width: 50px; text-transform: uppercase; letter-spacing: 0.5px; }
        .config-node input { background: transparent; border: none; outline: none; color: white; font-size: 14px; width: 100%; font-weight: 500; }

        /* Interactive Canvas Framework Elements */
        .canvas-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; gap: 16px; flex-wrap: wrap; }
        .tab-strip { display: flex; gap: 4px; }
        .bento-tab-btn { background: none; border: none; padding: 12px 20px; font-weight: 700; font-size: 14px; color: var(--text-secondary); cursor: pointer; position: relative; transition: color 0.2s; }
        .bento-tab-btn.active { color: var(--text-primary); }
        .bento-tab-btn.active::after { content: ''; position: absolute; bottom: -13px; left: 0; right: 0; height: 3px; background: var(--accent-purple); border-radius: 2px; box-shadow: 0 0 14px var(--accent-purple); }

        /* Search Input Panel styling */
        .search-container { position: relative; min-width: 200px; flex-grow: 1; max-width: 320px; }
        .search-input { width: 100%; background: rgba(10, 12, 16, 0.4); border: 1px solid var(--border-color); padding: 10px 16px; padding-left: 36px; border-radius: 20px; color: var(--text-primary); font-size: 13px; outline: none; transition: border-color 0.2s; }
        .search-input:focus { border-color: var(--accent-cyan); }
        .search-icon { position: absolute; left: 14px; top: 12px; width: 14px; height: 14px; fill: var(--text-secondary); }

        .share-wa-btn { background: rgba(37, 211, 102, 0.1); border: 1px solid rgba(37, 211, 102, 0.2); color: #25D366; padding: 10px 18px; border-radius: 20px; font-weight: 700; font-size: 12px; cursor: pointer; transition: background 0.2s; }
        .share-wa-btn:hover { background: rgba(37, 211, 102, 0.2); }

        .canvas-viewport { display: none; margin-top: 10px; min-height: 220px; max-height: 550px; overflow-y: auto; padding-right: 8px; }
        .canvas-viewport.active { display: block; animation: panelFade 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Premium Post Module Canvas Cards */
        .feed-post-card {
            background: rgba(15, 18, 24, 0.35); border: 1px solid var(--border-color);
            padding: 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 14px; transition: border-color 0.25s, background 0.25s, transform 0.25s;
        }
        .feed-post-card:hover { border-color: rgba(6, 182, 212, 0.3); background: rgba(20, 25, 35, 0.6); transform: translateX(3px); }
        .feed-post-card.completed-line { opacity: 0.3; background: rgba(10,12,16,0.15); }
        .feed-post-card.completed-line h4 { text-decoration: line-through; color: var(--text-secondary); }

        .card-segment-left { display: flex; align-items: center; gap: 16px; flex-grow: 1; }
        .checkbox-node { width: 19px; height: 19px; cursor: pointer; accent-color: var(--accent-green); }
        .thumbnail-favicon { width: 36px; height: 36px; border-radius: 10px; background: rgba(0,0,0,0.4); padding: 8px; border: 1px solid var(--border-color); object-fit: contain; }
        
        .meta-container h4 { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }
        .meta-container p { font-size: 12px; color: var(--text-secondary); display: flex; gap: 10px; align-items: center; margin-top: 5px; font-weight: 500; }
        
        .badge-pill { padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; text-transform: uppercase; border: 1px solid transparent; letter-spacing: 0.5px; }
        .badge-pill.high { background: rgba(239, 68, 68, 0.12); border-color: #ef4444; color: #f87171; }
        .badge-pill.medium { background: rgba(245, 158, 11, 0.12); border-color: #f59e0b; color: #fbbf24; }
        .badge-pill.low { background: rgba(255,255,255,0.04); border-color: var(--border-color); color: var(--text-secondary); }
        
        .price-readout { font-weight: 700; color: var(--accent-green); font-size: 14px; }
        .inline-sync-btn { background: rgba(6, 182, 212, 0.08); border: 1px solid rgba(6, 182, 212, 0.18); color: #22d3ee; font-size: 11px; font-weight: 700; cursor: pointer; padding: 3px 8px; border-radius: 6px; transition: 0.2s; }

        .card-segment-right { display: flex; align-items: center; }
        .kill-row-btn { background: none; border: none; color: var(--danger); font-size: 16px; cursor: pointer; padding: 8px; opacity: 0.5; transition: opacity 0.2s; }
        .kill-row-btn:hover { opacity: 1; }

        .empty-illustration { text-align: center; color: var(--text-secondary); padding: 70px 0; font-size: 13px; border: 1px dashed var(--border-color); border-radius: 18px; background: rgba(0,0,0,0.15); }
        
        /* Glassmorphic Production Popup Modal Container */
        .modal-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 12, 16, 0.6); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            z-index: 5000; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease;
        }
        .modal-mask.open { opacity: 1; visibility: visible; }
        .modal-box {
            background: #181c26; border: 1px solid var(--border-color); width: 90%; max-width: 420px;
            border-radius: 24px; padding: 28px; box-shadow: 0 24px 50px rgba(0,0,0,0.7);
            transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-mask.open .modal-box { transform: scale(1); }
        .modal-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
        .modal-box p { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
        .modal-box input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 12px; color: white; font-size: 14px; outline: none; margin-bottom: 20px; }
        .modal-box input:focus { border-color: var(--accent-purple); }
        .modal-btn-row { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-btn { padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
        .modal-btn.confirm { background: var(--accent-purple); color: white; }
        .modal-btn.cancel { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border-color); }

        /* Automation Keyframes Framework */
        @keyframes pulseGlow { 0%, 100% { transform: scale(1); opacity: 0.35; } 50% { transform: scale(1.15); opacity: 0.5; } }
        @keyframes bootScale { to { transform: scale(1); opacity: 1; } }
        @keyframes panelFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* High-Definition Media Query Adapters */
        @media (max-width: 1150px) {
            .col-4 { grid-column: span 6; }
            .col-12 { grid-column: span 12; }
            .col-5 { grid-column: span 12; }
            .col-7 { grid-column: span 12; }
        }
        @media (max-width: 768px) {
            body { padding-top: 95px; }
            .app-layout { grid-template-columns: 1fr; gap: 18px; padding: 0 18px; }
            .col-3, .col-4, .col-5, .col-6, .col-7, .col-8, .col-12 { grid-column: span 1; }
            .form-layout { grid-template-columns: 1fr; }
            .field-box.wide { grid-column: span 1; }
            .action-submit-btn { grid-column: span 1; }
            .canvas-header-row { flex-direction: column; align-items: flex-start; gap: 16px; }
            .tab-strip { width: 100%; overflow-x: auto; padding-bottom: 6px; }
            .search-container { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-glow"></div>
        <svg class="splash-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30,20 L50,55 L70,20 L85,20 L57,68 L57,80 L43,80 L43,68 L15,20 Z" fill="#7C5CFF"/>
            <circle cx="50" cy="43" r="6" fill="#06B6D4"/>
        </svg>
    </div>

    <div class="modal-mask" id="overrideModal">
        <div class="modal-box">
            <h3>Firewall Restriction</h3>
            <p>Target vendor blocks automated tracking queries. Manually inject the price calculation parameter to pass validation:</p>
            <input type="text" id="modalPriceInput" placeholder="Enter raw price value (e.g., 2256)">
            <div class="modal-btn-row">
                <button class="modal-btn cancel" onclick="closeOverrideModal(false)">Cancel</button>
                <button class="modal-btn confirm" onclick="closeOverrideModal(true)">Inject Price</button>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-wrap">
            <a href="#" class="brand-container">
                <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M30,20 L50,55 L70,20 L85,20 L57,68 L57,80 L43,80 L43,68 L15,20 Z" fill="#7C5CFF"/>
                    <circle cx="50" cy="43" r="6" fill="#06B6D4"/>
                </svg>
                <div class="brand-name">rē<span>v</span>ra</div>
            </a>
            <div class="font-heading" style="font-size: 11px; font-weight: 700; color: var(--text-secondary); letter-spacing: 1.5px; text-transform: uppercase;">SaaS Node OS</div>
        </div>
    </nav>

    <div class="app-layout">
        
        <div class="bento-panel col-4">
            <div class="panel-header"><span class="panel-tag">Monitored Metrics</span></div>
            <div class="metric-large" id="totalCount">0 Assets</div>
        </div>

        <div class="bento-panel col-4">
            <div class="panel-header"><span class="panel-tag">Gross Capital Added</span></div>
            <div class="metric-large cyan-glow" id="totalBudget">₹0</div>
        </div>

        <div class="bento-panel col-4">
            <div class="panel-header"><span class="panel-tag">Data Registry</span></div>
            <div style="margin-top: auto; padding-top: 8px;">
                <button onclick="wipeCoreRegistry()" style="background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; padding: 13px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 13px; width: 100%; transition: background 0.2s;">Wipe Local Storage</button>
            </div>
        </div>

        <div class="bento-panel col-5">
            <div class="panel-header"><span class="panel-tag">Inject New Asset Node</span></div>
            <form id="masterForm">
                <div class="form-layout">
                    <div class="field-box wide">
                        <label>Asset Identity Label</label>
                        <input type="text" id="itemName" placeholder="e.g., Luxurious Linen Dress Shirt" required>
                    </div>
                    <div class="field-box wide">
                        <label>Target Destination Hyperlink</label>
                        <input type="url" id="itemLink" placeholder="https://..." required>
                    </div>
                    <div class="field-box">
                        <label>Canvas Workspace Target</label>
                        <select id="itemCategory"></select>
                    </div>
                    <div class="field-box">
                        <label>Asset Cost Input (₹)</label>
                        <input type="text" id="itemPrice" placeholder="Leave blank to auto-track">
                    </div>
                    <div class="field-box wide">
                        <label>Watchlist Priority Alert</label>
                        <select id="itemPriority">
                            <option value="low">Low Trace Priority</option>
                            <option value="medium">Medium Trace Priority</option>
                            <option value="high">🔥 High Priority Surveillance</option>
                        </select>
                    </div>
                    <button type="submit" id="submitBtn" class="action-submit-btn">Deploy Asset To Platform</button>
                </div>
            </form>
        </div>

        <div class="bento-panel col-7">
            <div class="panel-header"><span class="panel-tag">Dynamic Category Configs</span></div>
            <div class="config-row">
                <div class="config-node"><label>Node 1</label><input type="text" id="set1" oninput="executeConfigModifications()"></div>
                <div class="config-node"><label>Node 2</label><input type="text" id="set2" oninput="executeConfigModifications()"></div>
                <div class="config-node"><label>Node 3</label><input type="text" id="set3" oninput="executeConfigModifications()"></div>
            </div>
        </div>

        <div class="bento-panel col-12">
            <div class="canvas-header-row">
                <div class="tab-strip">
                    <button class="bento-tab-btn active" id="btn1" onclick="switchCanvasViewportTab('cat1')"></button>
                    <button class="bento-tab-btn" id="btn2" onclick="switchCanvasViewportTab('cat2')"></button>
                    <button class="bento-tab-btn" id="btn3" onclick="switchCanvasViewportTab('cat3')"></button>
                </div>
                
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" class="search-input" id="canvasSearch" placeholder="Fuzzy query filter listing components..." oninput="executeCanvasSearchFilter()">
                </div>

                <button class="share-wa-btn" onclick="triggerWhatsAppTransmission()">Export Current Feed (WA) 💬</button>
            </div>

            <div id="cat1" class="canvas-viewport active"></div>
            <div id="cat2" class="canvas-viewport"></div>
            <div id="cat3" class="canvas-viewport"></div>
        </div>

    </div>

    <script>
        let categories = JSON.parse(localStorage.getItem('shop_categories')) || { cat1: "By Function", cat2: "By Event", cat3: "By Action" };
        let shoppingItems = JSON.parse(localStorage.getItem('shop_items')) || [];
        let currentActiveTab = 'cat1';
        let activeOverrideResolve = null;

        document.querySelectorAll('.bento-panel').forEach(panel => {
            panel.addEventListener('mousemove', e => {
                const rect = panel.getBoundingClientRect();
                panel.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                panel.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
            });
        });

        function systemStateBoot() {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.visibility = 'hidden', 500);
            }, 800);

            document.getElementById('set1').value = categories.cat1;
            document.getElementById('set2').value = categories.cat2;
            document.getElementById('set3').value = categories.cat3;

            const dropdown = document.getElementById('itemCategory');
            dropdown.innerHTML = '';
            Object.keys(categories).forEach(key => {
                let opt = document.createElement('option');
                opt.value = key; opt.innerText = categories[key];
                dropdown.appendChild(opt);
            });

            document.getElementById('btn1').innerText = categories.cat1;

            document.getElementById('btn3').innerText = categories.cat3;

        }

        function switchCanvasViewportTab(tabId) {
            currentActiveTab = tabId;
            document.querySelectorAll('.canvas-viewport').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.bento-tab-btn').forEach(t => t.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'cat1') document.getElementById('btn1').classList.add('active');
            if(tabId === 'cat2') document.getElementById('btn2').classList.add('active');
            if(tabId === 'cat3') document.getElementById('btn3').classList.add('active');
            executeCanvasSearchFilter();
        }

        function executeConfigModifications() {
            categories.cat1 = document.getElementById('set1').value || "By Function";
            categories.cat2 = document.getElementById('set2').value || "By Event";
            categories.cat3 = document.getElementById('set3').value || "By Action";
            localStorage.setItem('shop_categories', JSON.stringify(categories));
            systemStateBoot();
        }

        function openOverrideModalPopup() {
            document.getElementById('modalPriceInput').value = '';
            const modal = document.getElementById('overrideModal');
            modal.classList.add('open');
            return new Promise((resolve) => { activeOverrideResolve = resolve; });
        }

        function closeOverrideModal(isConfirm) {
            const modal = document.getElementById('overrideModal');
            modal.classList.remove('open');
            if (!activeOverrideResolve) return;
            
            if (isConfirm) {
                let textVal = document.getElementById('modalPriceInput').value;
                let cleanVal = parseFloat(textVal.replace(/[^0-9.]/g, '')) || 0;
                activeOverrideResolve(cleanVal);
            } else {
                activeOverrideResolve(0);
            }
            activeOverrideResolve = null;
        }

        function executeCanvasSearchFilter() {
            let filterTerm = document.getElementById('canvasSearch').value.toLowerCase().trim();
            let container = document.getElementById(currentActiveTab);
            let cards = container.getElementsByClassName('feed-post-card');

            Array.from(cards).forEach(card => {
                let itemNameText = card.querySelector('h4').innerText.toLowerCase();
                let subMetaDomainText = card.querySelector('p').innerText.toLowerCase();
                
                if (itemNameText.includes(filterTerm) || subMetaDomainText.includes(filterTerm)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        }
