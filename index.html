<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRR Mall - Home Dashboard</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --primary-text: #262626;
            --secondary-text: #737373;
            --ig-blue: #0095F6;
            --border-color: #dbdbdb;
            --ig-gradient: linear-gradient(45deg, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        html, body { min-height: 100vh; background-color: var(--bg-color); color: var(--primary-text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        header { margin: 20px 0 30px 0; text-align: center; }
        h1 { font-weight: 800; font-size: 34px; background: var(--ig-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: var(--secondary-text); font-size: 14px; margin-top: 5px; }
        
        .container { width: 100%; max-width: 600px; }
        
        /* AnyList / Bring inspired Stat Blocks */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; text-align: center; }
        .stat-card h3 { font-size: 12px; text-transform: uppercase; color: var(--secondary-text); letter-spacing: 0.5px; margin-bottom: 6px; }
        .stat-card p { font-size: 22px; font-weight: 800; color: var(--primary-text); }
        
        /* Launch Button Layout */
        .launch-btn { width: 100%; display: flex; justify-content: space-between; align-items: center; background: var(--ig-blue); color: white; text-decoration: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px; margin-bottom: 25px; box-shadow: 0 4px 12px rgba(0,149,246,0.15); transition: opacity 0.2s; }
        .launch-btn:active { opacity: 0.9; }

        /* Priority Grid Alert */
        .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--primary-text); margin-bottom: 12px; padding-left: 4px; display: flex; align-items: center; gap: 6px;}
        .priority-feed { margin-bottom: 25px; }
        .feed-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 14px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: inherit; margin-bottom: 8px; }
        .feed-card h4 { font-size: 14px; font-weight: 600; }
        .feed-card p { font-size: 11px; color: #fd5949; font-weight: 700; text-transform: uppercase; margin-top: 2px;}
        .feed-tag { font-size: 11px; background: #f4f4f4; padding: 2px 6px; border-radius: 4px; color: var(--secondary-text); font-weight: 600; }
        .no-items { background: var(--card-bg); border: 1px dashed var(--border-color); padding: 20px; text-align: center; border-radius: 8px; color: var(--secondary-text); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1>RRR Mall</h1>
        <p>Your Personal Shopping Command Center</p>
    </header>

    <div class="container">
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Tracked</h3>
                <p id="totalCount">0 Items</p>
            </div>
            <div class="stat-card">
                <h3>Estimated Value</h3>
                <p id="totalBudget">₹0</p>
            </div>
        </div>

        <a href="mall.html" class="launch-btn">
            <span>🛍️ Open My Collections</span>
            <span>→</span>
        </a>

        <div class="section-title">🚨 High Priority Watchlist</div>
        <div class="priority-feed" id="urgentFeed">
            </div>

    </div>

    <script>
        function loadDashboard() {
            const items = JSON.parse(localStorage.getItem('shop_items')) || [];
            const categories = JSON.parse(localStorage.getItem('shop_categories')) || { cat1: "By Function", cat2: "By Event", cat3: "By Action" };
            
            // Calculate Dashboard Stats
            document.getElementById('totalCount').innerText = `${items.length} ${items.length === 1 ? 'Item' : 'Items'}`;
            
            const totalValue = items.reduce((sum, item) => sum + (Number(item.price) || 0), 0);
            document.getElementById('totalBudget').innerText = `₹${totalValue.toLocaleString('en-IN')}`;
            
            // Build Urgent Watchlist Filter
            const urgentFeed = document.getElementById('urgentFeed');
            urgentFeed.innerHTML = '';
            
            const highPriorityItems = items.filter(item => item.priority === 'high');
            
            if (highPriorityItems.length === 0) {
                urgentFeed.innerHTML = `<div class="no-items">All clear! No urgent high-priority items tracked right now.</div>`;
            } else {
                highPriorityItems.forEach(item => {
                    const mappedListName = categories[item.category] || "Collection";
                    const card = document.createElement('a');
                    card.href = item.link;
                    card.target = "_blank";
                    card.className = "feed-card";
                    card.innerHTML = `
                        <div>
                            <h4>${item.name}</h4>
                            <p>Urgent Buy</p>
                        </div>
                        <span class="feed-tag">${mappedListName}</span>
                    `;
                    urgentFeed.appendChild(card);
                });
            }
        }
        
        // Initialize Core Dashboard Engine
        loadDashboard();
    </script>
</body>
</html>
