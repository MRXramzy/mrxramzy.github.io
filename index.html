    <style>
        :root {
            --bg-main: #0F1115;
            --bg-secondary: #171A21;
            --card-bg: rgba(30, 35, 45, 0.4);
            --card-hover: rgba(35, 43, 56, 0.65);
            --border-color: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(124, 92, 255, 0.35);
            
            --text-primary: #F5F7FA;
            --text-secondary: #9CA3AF;
            
            --accent-purple: #7C5CFF;
            --accent-cyan: #06B6D4;
            --accent-green: #22C55E;
            --danger: #EF4444;
            
            --revra-gradient: linear-gradient(135deg, #7C5CFF 0%, #06B6D4 100%);
            --glow-purple: radial-gradient(circle at top left, rgba(124, 92, 255, 0.18), transparent 45%);
            --glow-cyan: radial-gradient(circle at bottom right, rgba(6, 182, 212, 0.12), transparent 45%);
        }

        /* Ambient Matrix Grid Systems & Text Overrides */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, h4, .font-heading, .btn-text { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }

        body {
            background: 
                var(--glow-purple),
                var(--glow-cyan),
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px),
                var(--bg-main);
            background-size: 100% 100%, 100% 100%, 45px 45px, 45px 45px;
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: 110px;
            padding-bottom: 60px;
            overflow-x: hidden;
        }

        /* Launcher Splash Infrastructure Layout */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;
        }
        .splash-glow {
            position: absolute; width: 200px; height: 200px;
            background: var(--accent-purple); filter: blur(120px); opacity: 0.4;
            animation: pulseGlow 3s infinite ease-in-out;
        }
        .splash-logo { width: 80px; height: 80px; transform: scale(0.9); animation: bootScale 1.2s forwards cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 2; }

        /* Premium Glassmorphic Navigation Head */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 2000;
            background: rgba(15, 17, 21, 0.7);
            backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: center; padding: 20px 24px;
        }
        .nav-wrap { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; }
        .brand-container { display: flex; align-items: center; gap: 12px; text-decoration: none; position: relative; }
        .logo-svg { width: 28px; height: 28px; filter: drop-shadow(0 0 8px rgba(124,92,255,0.4)); }
        .brand-name { font-size: 26px; font-weight: 700; color: var(--text-primary); text-transform: lowercase; letter-spacing: -1.5px; }
        .brand-name span { color: var(--accent-cyan); }

        /* High-Density Layout Matrix Grid */
        .app-layout {
            width: 100%; max-width: 1240px; margin: 0 auto;
            padding: 0 24px; display: grid;
            grid-template-columns: repeat(12, 1fr); gap: 24px;
        }

        /* Glassmorphic Bento Modular Boxes */
        .bento-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color); border-radius: 24px; padding: 26px;
            position: relative; overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s, box-shadow 0.4s;
        }
        .bento-panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(255,255,255,0.03) 0%, transparent 60%);
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .bento-panel:hover::before { opacity: 1; }
        .bento-panel:hover {
            transform: translateY(-2px) scale(1.005);
            border-color: rgba(124, 92, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255,255,255,0.05);
        }

        /* Grid Allocation Architecture Weights */
        .col-4 { grid-column: span 4; }

        .col-7 { grid-column: span 7; }
        .col-12 { grid-column: span 12; }

        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
        .panel-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); }

        /* Dashboard Typography Displays */
        .metric-large { font-size: 46px; font-weight: 700; margin-top: 6px; letter-spacing: -1.5px; }

        /* Input Controls Layout System */
        .form-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
        .field-box { display: flex; flex-direction: column; gap: 8px; }
        .field-box.wide { grid-column: span 2; }
        .field-box label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.8px; }
        .field-box input, .field-box select {
            background: rgba(10, 12, 16, 0.45); border: 1px solid var(--border-color);
            padding: 13px 16px; border-radius: 14px; color: var(--text-primary); font-size: 14px;
            outline: none; transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }
        .field-box input:focus, .field-box select:focus { border-color: var(--accent-purple); background: rgba(10, 12, 16, 0.75); box-shadow: 0 0 0 3px rgba(124,92,255,0.15); }
        
        .action-submit-btn {
            grid-column: span 2; margin-top: 10px;
            background: var(--revra-gradient); color: white;
            border: none; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 14px;
            cursor: pointer; transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 4px 20px rgba(124, 92, 255, 0.25);
        }
        .action-submit-btn:hover { filter: brightness(1.1); }
        .action-submit-btn:active { transform: scale(0.98); }

        /* Control Nodes System Parameters */
        .config-row { display: flex; flex-direction: column; gap: 14px; }
        .config-node { display: flex; align-items: center; gap: 14px; background: rgba(10,12,16,0.25); padding: 12px 16px; border-radius: 14px; border: 1px solid var(--border-color); }
        .config-node label { font-size: 11px; font-weight: 700; color: var(--accent-purple); min-width: 50px; text-transform: uppercase; letter-spacing: 0.5px; }
        .config-node input { background: transparent; border: none; outline: none; color: white; font-size: 14px; width: 100%; font-weight: 500; }

        /* Interactive Canvas Framework Elements */
        .canvas-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .tab-strip { display: flex; gap: 6px; }
        .bento-tab-btn { background: none; border: none; padding: 12px 20px; font-weight: 700; font-size: 14px; color: var(--text-secondary); cursor: pointer; position: relative; transition: color 0.2s; }
        .bento-tab-btn.active { color: var(--text-primary); }
        .bento-tab-btn.active::after { content: ''; position: absolute; bottom: -13px; left: 0; right: 0; height: 3px; background: var(--accent-purple); border-radius: 2px; box-shadow: 0 0 14px var(--accent-purple); }

        .share-wa-btn { background: rgba(37, 211, 102, 0.1); border: 1px solid rgba(37, 211, 102, 0.2); color: #25D366; padding: 10px 18px; border-radius: 20px; font-weight: 700; font-size: 12px; cursor: pointer; transition: background 0.2s; }
        .share-wa-btn:hover { background: rgba(37, 211, 102, 0.2); }

        .canvas-viewport { display: none; margin-top: 10px; min-height: 220px; max-height: 550px; overflow-y: auto; padding-right: 8px; }
        .canvas-viewport.active { display: block; animation: panelFade 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        /* Premium Post Module Canvas Cards */
        .feed-post-card {
            background: rgba(15, 18, 24, 0.35); border: 1px solid var(--border-color);
            padding: 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 14px; transition: border-color 0.25s, background 0.25s, transform 0.25s;
